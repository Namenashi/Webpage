<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 90;
    }
  </style>
</head>
<body>

  <!-- 헤더 마운트 -->
  <div id="header-mount"></div>

  <!-- 메인 레이아웃 -->
  <div class="main-wrapper">

    <!-- 좌측 패널 (고정 구조, 내용은 JS가 채움) -->
    <aside class="left-panel">
      <div class="left-accent-box"></div>

      <div>
        <div class="project-label">Project</div>
        <div class="project-title-main" id="leftTitle">—</div>
        <div class="progress-wrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="leftProgressFill" style="width:0%"></div>
          </div>
          <div class="progress-label" id="leftProgressLabel">—</div>
        </div>
      </div>

      <div class="divider-line"></div>

      <div class="meta-item">
        <div class="project-label">Status</div>
        <div class="status-badge">
          <div class="status-dot"></div>
          <span id="leftStatus">—</span>
        </div>
      </div>

      <div class="meta-item">
        <div class="project-label">//Theme</div>
        <div class="meta-value" id="leftTheme">—</div>
      </div>

      <div class="meta-item">
        <div class="project-label">//Category</div>
        <div class="meta-value" id="leftCategory">—</div>
      </div>

      <div class="meta-item">
        <div class="project-label">//Year</div>
        <div class="meta-value" id="leftYear">—</div>
      </div>

      <div class="divider-line"></div>

      <div class="big-number" id="leftIndex">—</div>

      <div class="left-actions">
        <button class="icon-btn" title="Share">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </button>
        <button class="icon-btn" title="Fullscreen">
          <svg viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        </button>
      </div>
    </aside>

    <!-- 섹션 콘텐츠 (project.js가 렌더링) -->
    <div class="center-area" id="content-mount"></div>

  </div><!-- end main-wrapper -->

  <!-- 우측 트리거 -->
  <div class="right-trigger" id="rightTrigger" onclick="toggleDesc()">
    <div class="right-trigger-text">Description</div>
    <div class="right-crosshair">
      <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <line x1="10" y1="0" x2="10" y2="20"/>
        <line x1="0" y1="10" x2="20" y2="10"/>
        <circle cx="10" cy="10" r="4" fill="none" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <!-- Description drawer (내용은 project.js가 채움) -->
  <div class="desc-drawer" id="descDrawer">
    <div class="desc-header">
      <div class="desc-header-label">//Description</div>
      <button class="desc-close" onclick="toggleDesc()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="desc-body">
      <div class="desc-slide-title" id="descTitle"></div>
      <div class="desc-tags"        id="descTagsWrap"></div>
      <p   class="desc-text"        id="descText"></p>
      <div class="desc-spec-table"  id="descSpecTable"></div>
      <p   class="desc-text"        id="descNotes" style="font-size:12px;color:var(--text-muted);"></p>
    </div>
  </div>

  <!-- 푸터 마운트 -->
  <div id="footer-mount"></div>

  <!-- JS -->
  <script src="js/components.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/project.js"></script>

  <script>
    function updateLayout() {
      const footerEl = document.querySelector('footer');
      const footerH  = footerEl ? footerEl.offsetHeight : 0;
      const navH     = document.querySelector('nav') ? document.querySelector('nav').offsetHeight : 56;

      document.documentElement.style.setProperty('--footer-h', footerH + 'px');

      const availH = window.innerHeight - navH - footerH;
      document.documentElement.style.setProperty('--available-h', availH + 'px');

      // 크롬 높이 측정 (section-divider + gallery-nav + indicators)
      const dividerEl = document.querySelector('.section-divider');
      const navEl     = document.querySelector('.gallery-nav');
      const indEl     = document.querySelector('[id^="indicators"]');
      const chromeH   = (dividerEl ? dividerEl.offsetHeight : 61)
                      + (navEl     ? navEl.offsetHeight     : 40)
                      + (indEl     ? indEl.offsetHeight      : 28);

      // 기본 너비 = 70vw (right-w 60px 포함 계산)
      const rightW    = 60;
      const defaultW  = window.innerWidth * 0.7 - rightW;

      // 16:9 기준으로 너비에서 계산한 뷰포트 높이
      const ratioH    = defaultW * 9 / 16;
      // 가용 높이에서 크롬을 뺀 뷰포트 최대 높이
      const maxViewH  = availH - chromeH;

      let centerW, viewportMaxH;

      if (ratioH <= maxViewH) {
        // 화면이 충분히 크다 → 기본 너비 유지
        centerW      = defaultW;
        viewportMaxH = ratioH;
      } else {
        // 화면이 세로로 짧다 → 높이에 맞게 너비 역산
        viewportMaxH = maxViewH;
        centerW      = maxViewH * 16 / 9;
      }

      document.documentElement.style.setProperty('--center-w',       centerW      + 'px');
      document.documentElement.style.setProperty('--viewport-max-h', viewportMaxH + 'px');
    }

    // 푸터 렌더링 감지
    new MutationObserver(() => {
      if (document.querySelector('footer')) updateLayout();
    }).observe(document.getElementById('footer-mount'), { childList: true });

    // 섹션 렌더링 후 크롬 높이 재측정
    document.addEventListener('galleriesReady', updateLayout);

    window.addEventListener('resize', updateLayout);
  </script>

</body>
</html>
